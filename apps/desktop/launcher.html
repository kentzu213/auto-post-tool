<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izzi Auto Post — Cấu hình máy chủ</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #05070f;
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #ffffff;
      --text-muted: #64748b;
      --cyan-neon: #67e8f9;
      --violet-neon: #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .glow-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(103, 232, 249, 0.08) 0%, rgba(167, 139, 250, 0.05) 50%, rgba(0,0,0,0) 70%);
      filter: blur(40px);
      z-index: 0;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseGlow 8s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    .launcher-card {
      width: 480px;
      padding: 40px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 10;
      text-align: center;
      position: relative;
    }

    .drag-region {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      -webkit-app-region: drag;
    }

    .logo-svg { filter: drop-shadow(0 0 12px rgba(103, 232, 249, 0.4)); margin-bottom: 20px; }

    .app-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text-main) 30%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 28px;
      font-weight: 200;
      line-height: 1.5;
    }

    .url-label {
      display: block;
      text-align: left;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .url-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: var(--cyan-neon); }

    .btn-row { display: flex; gap: 12px; }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(103, 232, 249, 0.2) 0%, rgba(167, 139, 250, 0.2) 100%);
      border-color: rgba(103, 232, 249, 0.3);
      color: var(--text-main);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(103, 232, 249, 0.3) 0%, rgba(167, 139, 250, 0.3) 100%);
      border-color: var(--cyan-neon);
      box-shadow: 0 0 15px rgba(103, 232, 249, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }

    .btn-secondary:hover { color: var(--text-main); border-color: rgba(255,255,255,0.2); }

    .hint { font-size: 11px; color: var(--text-muted); margin-top: 18px; font-weight: 200; }
  </style>
</head>
<body>
  <div class="drag-region"></div>
  <div class="glow-bg"></div>

  <div class="launcher-card">
    <svg class="logo-svg" width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-svg" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
          <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
        </filter>
        <linearGradient id="neon-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#67e8f9"></stop>
          <stop offset="100%" stop-color="#a78bfa"></stop>
        </linearGradient>
      </defs>
      <path d="M38 12c-6 0-14 2-14 10 0 6 5 8 10 10 5 2 10 3 10 8 0 7-8 12-16 12" stroke="url(#neon-grad)" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#glow-svg)"></path>
      <path d="M26 52c6 0 14-2 14-10 0-6-5-8-10-10-5-2-10-3-10-8 0-7 8-12 16-12" stroke="url(#neon-grad)" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#glow-svg)"></path>
    </svg>

    <h1 class="app-title">Izzi Auto Post</h1>
    <p class="app-subtitle">Nhập địa chỉ máy chủ đã được lưu trữ (hosted) để bắt đầu sử dụng.</p>

    <label class="url-label" for="serverUrl">URL máy chủ</label>
    <input id="serverUrl" class="url-input" type="text" placeholder="https://app.example.com" spellcheck="false" autocomplete="off" />

    <div class="btn-row">
      <button class="btn btn-secondary" id="cancelBtn">Dùng mặc định</button>
      <button class="btn btn-primary" id="connectBtn">Kết nối</button>
    </div>

    <p class="hint">Bạn có thể đổi URL này sau trong menu Tệp → Đổi URL máy chủ.</p>
  </div>

  <script>
    const input = document.getElementById('serverUrl');
    const connectBtn = document.getElementById('connectBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    // Prefill with the documented default URL provided by the main process.
    if (window.izziPrompt && window.izziPrompt.getDefault) {
      window.izziPrompt.getDefault().then((def) => {
        if (def && !input.value) input.value = def;
        input.focus();
        input.select();
      });
    }

    function submit() {
      const value = input.value.trim();
      if (window.izziPrompt) window.izziPrompt.submit(value);
    }

    function cancel() {
      if (window.izziPrompt) window.izziPrompt.cancel();
    }

    connectBtn.addEventListener('click', submit);
    cancelBtn.addEventListener('click', cancel);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
      if (e.key === 'Escape') cancel();
    });
  </script>
</body>
</html>
