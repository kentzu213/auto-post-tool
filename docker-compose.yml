version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autopost_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-autopost}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autopost_network

  redis:
    image: redis:7-alpine
    container_name: autopost_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - autopost_network

  minio:
    image: minio/minio:latest
    container_name: autopost_minio
    restart: always
    ports:
      - '9000:9000' # API Port
      - '9001:9001' # Web UI Console Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - minio_config:/root/.minio
    networks:
      - autopost_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  minio_config:
    driver: local

networks:
  autopost_network:
    driver: bridge
