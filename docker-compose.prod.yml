version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autopost_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-autopost}
    ports:
      - '5432:5432'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - autopost_prod_net

  redis:
    image: redis:7-alpine
    container_name: autopost_prod_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    networks:
      - autopost_prod_net

  minio:
    image: minio/minio:RELEASE.2024-02-09T02-33-46Z
    container_name: autopost_prod_minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_prod_data:/data
      - minio_prod_config:/root/.minio
    networks:
      - autopost_prod_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autopost_prod_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autopost}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: "http://minio:9000"
      S3_FORCE_PATH_STYLE: "true"
    networks:
      - autopost_prod_net

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: autopost_prod_worker
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autopost}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - autopost_prod_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: autopost_prod_web
    restart: always
    depends_on:
      - api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - autopost_prod_net

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  minio_prod_config:

networks:
  autopost_prod_net:
    driver: bridge
