version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autopost_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superprodpassword999
      POSTGRES_DB: autopost
    ports:
      - '5432:5432'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - autopost_prod_net

  redis:
    image: redis:7-alpine
    container_name: autopost_prod_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    networks:
      - autopost_prod_net

  minio:
    image: minio/minio:RELEASE.2024-02-09T02-33-46Z
    container_name: autopost_prod_minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword123
    command: server /data --console-address ":9001"
    volumes:
      - minio_prod_data:/data
      - minio_prod_config:/root/.minio
    networks:
      - autopost_prod_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autopost_prod_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:superprodpassword999@postgres:5432/autopost?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadminpassword123"
      S3_BUCKET_NAME: "autopost-media"
      S3_REGION: "us-east-1"
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: "yoursuperjwtsecretkeyforproductiondevelopmentchangeit"
      JWT_REFRESH_SECRET: "yourrefreshsecretkeyforproductiondevelopmentchangeit"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    networks:
      - autopost_prod_net

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: autopost_prod_worker
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:superprodpassword999@postgres:5432/autopost?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    networks:
      - autopost_prod_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: autopost_prod_web
    restart: always
    depends_on:
      - api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - autopost_prod_net

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  minio_prod_config:

networks:
  autopost_prod_net:
    driver: bridge
